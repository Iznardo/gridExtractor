# nginx serving the static React bundle and reverse-proxying the API.
# This is the production counterpart of Vite's dev proxy (see vite.config.ts):
# the browser only ever sees a single origin, so there's no CORS and no
# hardcoded API host in the frontend. API_BASE defaults to "/api".

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # /api/foo -> http://api:8000/foo  (strip the /api prefix, same as the
    # Vite dev proxy's rewrite). `api` is the compose service name, port 8000
    # is its internal port — NOT the host-published API_PORT.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed build assets: safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: BrowserRouter handles client-side routes, so any unknown
    # path must return index.html instead of a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
