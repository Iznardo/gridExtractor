# Cuentas de SoloQ a trackear. Se vuelcan a la tabla `accounts` con
# `python -m src.riot.accounts_sync`.
#
#   riot_id : "Nombre#TAG" — solo para resolver el PUUID; en BD no se
#             guarda nunca (los Riot IDs cambian, el puuid no).
#   player  : OBLIGATORIO para el sync — nombre EXACTO del jugador en la
#             tabla `players` (los jugadores vienen del discovery de GRID;
#             el sync no los crea). Con null la cuenta se salta con WARNING.
#   region  : cluster regional de Match-V5 (americas/asia/europe/sea).
#             null = autodetectar (avisa por log); fijarla para ahorrar
#             requests.

accounts:
  - riot_id: "J1HUIV#000"
    player: "Vladi"
    region: europe
  - riot_id: "Byron Love#1v9"
    player: "Oscarinin"
    region: europe
