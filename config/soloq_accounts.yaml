# SoloQ accounts to track. Synced into the `accounts` table with
# `python -m src.riot.accounts_sync`.
#
#   riot_id : "Name#TAG" — only used to resolve the PUUID; never stored in
#             the DB (Riot IDs change, the puuid doesn't).
#   player  : REQUIRED for the sync — the EXACT name of the player in the
#             `players` table (players come from GRID discovery; the sync
#             does not create them). null skips the account with a WARNING.
#   region  : Match-V5 regional cluster (americas/asia/europe/sea).
#             null = autodetect (logs a warning); set it to save requests.

accounts:
  - riot_id: "J1HUIV#000"
    player: "Vladi"
    region: europe
  - riot_id: "Byron Love#1v9"
    player: "Oscarinin"
    region: europe
