# Postgres 16 para gridExtractor.
# Credenciales en `.env` (ver .env.example).
# El schema se aplica automaticamente la primera vez que arranca el contenedor
# (cuando ./postgres_data esta vacio) gracias al montaje en
# /docker-entrypoint-initdb.d/.
# Reaplicar a mano: docker compose exec -T db psql -U "$PGUSER" -d "$PGDATABASE" < db/schema.sql

services:
  db:
    image: postgres:16
    container_name: gridextractor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    ports:
      # Bind solo a localhost: la BD no se expone a la red. Suficiente para
      # DBeaver y la API (que dentro de compose usa el host interno `db`).
      - "127.0.0.1:${PGPORT}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  # API read-only (FastAPI) sobre la misma BD. Arranca con la BD; un solo
  # `docker compose up` levanta ambos. No hay que lanzar uvicorn a mano.
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: gridextractor-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Dentro de la red de compose la BD es el host `db` en su puerto interno
      # 5432 — NO el ${PGPORT} publicado al host (que puede ser otro).
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE}
      # Solo para el proxy de descarga de replays (.rofl): la API la usa
      # server-side; nunca se expone al navegador.
      GRID_API_KEY: ${GRID_API_KEY}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Codigo en vivo: editar src/ recarga la API sin reconstruir la imagen.
      - ./src:/app/src:ro
    command:
      ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
