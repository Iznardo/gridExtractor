# Postgres 16 for gridExtractor.
# Credentials in `.env` (see .env.example).
# The schema is applied automatically the first time the container starts
# (when ./postgres_data is empty) via the mount in
# /docker-entrypoint-initdb.d/.
# Reapply manually: docker compose exec -T db psql -U "$PGUSER" -d "$PGDATABASE" < db/schema.sql

services:
  db:
    image: postgres:16
    container_name: gridextractor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    ports:
      # Bind to localhost only: the DB is not exposed to the network. Enough for
      # DBeaver and the API (which inside compose uses the internal host `db`).
      - "127.0.0.1:${PGPORT}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Read-only API (FastAPI) over the same DB. Starts with the DB; a single
  # `docker compose up` brings up both. No need to launch uvicorn by hand.
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: gridextractor-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network the DB is the host `db` on its internal port
      # 5432 — NOT the ${PGPORT} published to the host (which may differ).
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE}
      # Only for the replay (.rofl) download proxy: the API uses it server-side;
      # never exposed to the browser.
      GRID_API_KEY: ${GRID_API_KEY}
    ports:
      # Loopback only: the API is reached through the `web` nginx proxy over the
      # internal compose network, not directly from the LAN/internet. Local dev
      # tooling on this host can still hit localhost:${API_PORT}.
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      # Live code: editing src/ reloads the API without rebuilding the image.
      - ./src:/app/src:ro
    healthcheck:
      # /health returns 503 if the DB doesn't respond; urlopen raises on !=200.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command:
      ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # Frontend: static React bundle (Vite build) served by nginx, which also
  # reverse-proxies /api -> the `api` service. This is the production
  # counterpart of Vite's dev proxy, so a single `docker compose up` now brings
  # up db + api + web. For active development you can still use `npm run dev`
  # (HMR) instead; this service serves a built, immutable bundle.
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gridextractor-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      # WEB_HOST controls the bind address. Default 0.0.0.0 = reachable on every
      # interface (LAN + Tailscale). Set WEB_HOST=127.0.0.1 to expose it ONLY via
      # `tailscale serve` (loopback), keeping it off the LAN/public interfaces.
      - "${WEB_HOST:-0.0.0.0}:${WEB_PORT:-8080}:80"
