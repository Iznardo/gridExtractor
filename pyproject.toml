[tool.pytest.ini_options]
# Repo root on sys.path so `import src...` works with plain `pytest` (not
# just `python -m pytest`). Needed for CI.
pythonpath = ["."]
# Limits collection to tests/ — without this, `pytest` (no args) recurses
# into postgres_data/ (Docker volume, owned by root) and dies with a
# PermissionError trying to read the container's files.
testpaths = ["tests"]
norecursedirs = [
    "postgres_data",
    "data",
    ".venv",
    "frontend",
    "*.egg-info",
]
